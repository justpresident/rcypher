name: Release binaries

# Build prebuilt `rcypher` binaries on each target's NATIVE runner and attach them
# to the GitHub release for the tag. This never publishes to crates.io -
# `cargo publish` stays a separate manual step in docs/crate_release_process.md.
#
# Four binaries: static x86_64 and ARM64 Linux (musl) builds that run on any
# distro regardless of glibc version, plus Intel and Apple-Silicon macOS builds.
# Each is built on a NATIVE runner - cross-compiling Apple targets from Linux
# needs Apple's SDK, and native ARM avoids a cross-musl toolchain.
#
# The musl builds omit the FIDO2 security-key factor (its USB-HID backend can't
# static-link into musl yet); the macOS builds include it. `cargo install` builds
# FIDO2 in by default on any host with the build deps.
#
# Fires when a GitHub release is PUBLISHED (the curated-notes step in
# docs/crate_release_process.md), so the binary attaches to that release with no
# race against its creation.
on:
  release:
    types: [published]
  # Manual run, so the workflow can be exercised against an EXISTING tag without
  # cutting a new release: dispatch with e.g. tag = v0.2.0.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and attach the binary to (e.g. v0.2.0)'
        required: true

permissions:
  contents: write  # create/update the release and upload assets

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Static musl: a Linux binary that runs on any distro regardless of
          # glibc version. Built on each arch's native runner. FIDO2 is OFF for
          # these (`--no-default-features`): the hidapi/libudev USB-HID backend
          # can't static-link into a musl binary yet — see the follow-up task
          # `fido2-musl-static-builds`. `cargo install` still gets FIDO2 by default.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            cargo_args: "--no-default-features"
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            cargo_args: "--no-default-features"
          # macOS Intel, built native on the Intel runner. FIDO2 on (hidapi uses
          # IOKit — no system libs needed).
          - os: macos-15-intel
            target: x86_64-apple-darwin
            cargo_args: ""
          # macOS Apple Silicon, built native on the arm runner. FIDO2 on.
          - os: macos-15
            target: aarch64-apple-darwin
            cargo_args: ""

    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: echo "name=${{ github.event.inputs.tag || github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"

      - name: Checkout the tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # The musl targets build without FIDO2 (pure Rust), linking through musl-gcc.
      - name: Install musl tools
        if: contains(matrix.target, '-linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} -p rcypher-cli --bin rcypher ${{ matrix.cargo_args }}

      # Archive: rcypher + README + LICENSE as rcypher-<tag>-<target>.tar.gz, plus
      # a sibling .sha256. The binary is already stripped via [profile.release].
      - name: Package
        id: package
        shell: bash
        run: |
          set -euo pipefail
          name="rcypher-${{ steps.tag.outputs.name }}-${{ matrix.target }}"
          staging="$name"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/rcypher" "$staging/"
          cp README.md LICENSE "$staging/"
          tar czf "$name.tar.gz" "$staging"
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"
          echo "archive=$name.tar.gz" >> "$GITHUB_OUTPUT"

      # Upload via the `gh` CLI (preinstalled on the runners). The release always
      # exists here (this fires on `release: published`, and workflow_dispatch
      # targets an existing tag's release); `--clobber` makes a re-run idempotent.
      - name: Attach to the release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ steps.tag.outputs.name }}" \
            "${{ steps.package.outputs.archive }}" \
            "${{ steps.package.outputs.archive }}.sha256" \
            --clobber
